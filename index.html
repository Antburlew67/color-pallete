<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-12">
                <h1 class="text-center">Color Categories</h1>
            </div>
        </div>
    </div class="row">
    <h2 class="text-center">Primary Color</h2>
    <div class="row">
         <div class="col-4">
        <div id="red">#ff0000</div>
    </div>
       <div class="col-4">
        <div id="blue"></div>
    </div>
       <div class="col-4">
        <div id="yellow"></div>
    </div>
    </div>
    <h2 class="text-center">Secondary Color</h2>
    <div class="row">
         <div class="col-4">
        <div id="orange"></div>
    </div>
       <div class="col-4">
        <div id="green"></div>
    </div>
       <div class="col-4">
        <div id="purple"></div>
    </div>
    </div>
     </div class="row">
    <h2 class="text-center">Tertiary Color</h2>
    <div class="row">
         <div class="col-2">
        <div id="orange"></div>
    </div>
       <div class="col-2">
        <div id="charteuse"></div>
    </div>
       <div class="col-2">
        <div id="spring-green"></div>
    </div>
     <div class="col-2">
        <div id="azure"></div>
    </div>
     <div class="col-2">
        <div id="violet"></div>
    </div>
      <div class="col-2">
        <div id="rose"></div>
    </div>
    </div>
    <h2 class="text-center">Cool Color</h2>
    <div class="row">
         <div class="col-4">
        <div id="orange"></div>
    </div>
       <div class="col-4">
        <div id="green"></div>
    </div>
       <div class="col-4">
        <div id="purple"></div>
    </div>
    </div>
   
   
    </div>
        
        

      
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
